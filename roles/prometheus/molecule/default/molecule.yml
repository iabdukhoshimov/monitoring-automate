---
dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml
driver:
  name: docker
platforms:
  # Instances are placed in all groups the prometheus templates depend on,
  # so Jinja2 group lookups (groups['alertmanager'], etc.) resolve correctly.
  - name: prom-rocky9
    image: geerlingguy/docker-rockylinux9-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /usr/sbin/init
    groups:
      - prometheus
      - alertmanager
      - grafana
      - blackbox_exporter
      - monitoring
  - name: prom-ubuntu2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /usr/lib/systemd/systemd
    groups:
      - prometheus
      - alertmanager
      - grafana
      - blackbox_exporter
      - monitoring
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
verifier:
  name: ansible
