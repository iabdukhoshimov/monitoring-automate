---
prometheus_version: "2.51.0"
prometheus_port: 9090
prometheus_retention: "30d"
prometheus_scrape_interval: "15s"
prometheus_evaluation_interval: "15s"
prometheus_cluster_name: "production"

# system
prometheus_user: "prometheus"
prometheus_group: "prometheus"
prometheus_install_dir: "/usr/local/bin"
prometheus_config_dir: "/etc/prometheus"
prometheus_rules_dir: "/etc/prometheus/rules"
prometheus_data_dir: "/var/lib/prometheus"

# Checksums — must be set via group_vars; no safe defaults exist
# Get from: https://github.com/prometheus/prometheus/releases
prometheus_checksum: {}

# Blackbox probe targets — override in group_vars/prometheus/main.yml
prometheus_blackbox_http_targets: []
prometheus_blackbox_tcp_targets: []
prometheus_blackbox_icmp_targets: []
