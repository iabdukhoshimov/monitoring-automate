---
- name: Deploy prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0644"
  notify: validate and reload prometheus

- name: Deploy prometheus alerting rules
  ansible.builtin.template:
    src: alerting_rules.yml.j2
    dest: "{{ prometheus_rules_dir }}/alerting_rules.yml"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0644"
  notify: validate and reload prometheus

- name: Deploy prometheus recording rules
  ansible.builtin.template:
    src: recording_rules.yml.j2
    dest: "{{ prometheus_rules_dir }}/recording_rules.yml"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0644"
  notify: validate and reload prometheus
