---
- name: Deploy grafana systemd service
  ansible.builtin.template:
    src: grafana.service.j2
    dest: /etc/systemd/system/grafana.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart grafana

- name: Ensure grafana is started and enabled
  ansible.builtin.service:
    name: grafana
    state: started
    enabled: true
