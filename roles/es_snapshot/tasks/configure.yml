---
# Idempotent API-driven configuration.
# Runs from any host with network access to Elasticsearch.
# Safe to re-run — all calls are PUT (upsert).

- name: Assert required variables are set
  ansible.builtin.assert:
    that:
      - es_snapshot_minio_bucket | length > 0
      - es_snapshot_repository_name | length > 0
      - es_snapshot_index_pattern | length > 0
    fail_msg: "es_snapshot_minio_bucket, es_snapshot_repository_name, and es_snapshot_index_pattern must all be set."

- name: Wait for Elasticsearch to be available
  ansible.builtin.uri:
    url: "{{ es_snapshot_es_url }}/_cluster/health"
    method: GET
    url_username: "{{ es_snapshot_es_user | default(omit) }}"
    url_password: "{{ es_snapshot_es_password | default(omit) }}"
    force_basic_auth: "{{ es_snapshot_es_user != '' }}"
    status_code: 200
  register: es_health
  until: >
    es_health.status == 200 and
    es_health.json.status in ['green', 'yellow']
  retries: 12
  delay: 10

- name: Register MinIO as S3 snapshot repository
  ansible.builtin.uri:
    url: "{{ es_snapshot_es_url }}/_snapshot/{{ es_snapshot_repository_name }}"
    method: PUT
    url_username: "{{ es_snapshot_es_user | default(omit) }}"
    url_password: "{{ es_snapshot_es_password | default(omit) }}"
    force_basic_auth: "{{ es_snapshot_es_user != '' }}"
    body_format: json
    body:
      type: s3
      settings:
        bucket: "{{ es_snapshot_minio_bucket }}"
        client: "{{ es_snapshot_s3_client_name }}"
        path_style_access: true
    status_code: [200, 201]

- name: Configure ILM policy — hot/freeze/delete lifecycle
  ansible.builtin.uri:
    url: "{{ es_snapshot_es_url }}/_ilm/policy/logs_snapshot_policy"
    method: PUT
    url_username: "{{ es_snapshot_es_user | default(omit) }}"
    url_password: "{{ es_snapshot_es_password | default(omit) }}"
    force_basic_auth: "{{ es_snapshot_es_user != '' }}"
    body_format: json
    body:
      policy:
        phases:
          hot:
            min_age: "0ms"
            actions: {}
          frozen:
            min_age: "{{ es_snapshot_hot_days }}d"
            actions:
              searchable_snapshot:
                snapshot_repository: "{{ es_snapshot_repository_name }}"
                force_merge_index: false
          delete:
            min_age: "{{ (es_snapshot_hot_days | int + 1) }}d"
            actions:
              wait_for_snapshot:
                policy: logs_slm_policy
              delete: {}
    status_code: [200, 201]

- name: Configure SLM policy — daily snapshot to MinIO with retention
  ansible.builtin.uri:
    url: "{{ es_snapshot_es_url }}/_slm/policy/logs_slm_policy"
    method: PUT
    url_username: "{{ es_snapshot_es_user | default(omit) }}"
    url_password: "{{ es_snapshot_es_password | default(omit) }}"
    force_basic_auth: "{{ es_snapshot_es_user != '' }}"
    body_format: json
    body:
      schedule: "{{ es_snapshot_schedule }}"
      name: "<logs-{now/d}>"
      repository: "{{ es_snapshot_repository_name }}"
      config:
        indices: "{{ es_snapshot_index_pattern }}"
        ignore_unavailable: true
        include_global_state: false
      retention:
        min_count: "{{ es_snapshot_min_count }}"
        max_age: "{{ es_snapshot_max_age }}"
    status_code: [200, 201]

- name: Verify snapshot repository is accessible
  ansible.builtin.uri:
    url: "{{ es_snapshot_es_url }}/_snapshot/{{ es_snapshot_repository_name }}/_verify"
    method: POST
    url_username: "{{ es_snapshot_es_user | default(omit) }}"
    url_password: "{{ es_snapshot_es_password | default(omit) }}"
    force_basic_auth: "{{ es_snapshot_es_user != '' }}"
    status_code: 200
  register: repo_verify
  failed_when: repo_verify.json.nodes is not defined or repo_verify.json.nodes | length == 0
