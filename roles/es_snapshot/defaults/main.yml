---
# Elasticsearch connection
es_snapshot_es_url: "http://localhost:9200"
es_snapshot_es_user: ""
es_snapshot_es_password: ""

# MinIO / S3-compatible storage
es_snapshot_minio_url: "http://minio:9000"
es_snapshot_minio_bucket: "es-snapshots"
es_snapshot_minio_access_key: ""
es_snapshot_minio_secret_key: ""

# S3 client name used in elasticsearch.yml (allows multiple clients)
es_snapshot_s3_client_name: "minio"

# Repository name registered in Elasticsearch
es_snapshot_repository_name: "minio_backup"

# Index pattern to snapshot (matches all log indices by default)
es_snapshot_index_pattern: "logs-*"

# Hot retention (days): indices older than this are frozen and queued for deletion
# after a confirmed snapshot. Configurable: 3, 5, or 7.
es_snapshot_hot_days: 7

# SLM schedule — ES cron format (6 fields: seconds minutes hours day month weekday)
es_snapshot_schedule: "0 0 2 * * ?"  # 02:00 daily

# Snapshot retention in MinIO
es_snapshot_min_count: 1       # always keep at least 1 snapshot
es_snapshot_max_age: "90d"     # delete snapshots older than 90 days from MinIO

# Elasticsearch data directory (used by prereqs.yml to install plugin)
es_snapshot_es_home: "/usr/share/elasticsearch"
