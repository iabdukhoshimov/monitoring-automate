  amd64: "d2423ea4e6ca69a09867a4e2a18af32e4ee13c98ab3e4d33b1c6eebc81e7a43c"
  arm64: "46ec5a54a41dc1ea8a8cecee637e117de4807d3b0976482a16596e82e79ac484"

# Probe timeout defaults — override per module if needed
blackbox_exporter_timeout_http: "10s"
