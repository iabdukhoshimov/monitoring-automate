blackbox_exporter_checksum:
  amd64: "caf5d242fb1cf6d5cb678f3f799f22703d4fafea26b03dcbbd7e1f1825e06329"
  arm64: "63312be0983d85e5109710a7dc93df3051157ae581853fa3655d171cc1b2806e"

# Probe timeout defaults — override per module if needed
blackbox_exporter_timeout_http: "10s"
blackbox_exporter_timeout_tcp: "5s"
blackbox_exporter_timeout_icmp: "5s"
