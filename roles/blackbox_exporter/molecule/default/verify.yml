---
- name: Verify
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Check blackbox_exporter binary exists
      ansible.builtin.stat:
        path: /usr/local/bin/blackbox_exporter
      register: blackbox_exporter_binary

    - name: Assert binary is installed
      ansible.builtin.assert:
        that: blackbox_exporter_binary.stat.exists and blackbox_exporter_binary.stat.executable
        fail_msg: "blackbox_exporter binary not found or not executable"

    - name: Check config file exists
      ansible.builtin.stat:
        path: /etc/blackbox_exporter/blackbox.yml
      register: blackbox_exporter_config_file

    - name: Assert config file is present
      ansible.builtin.assert:
        that: blackbox_exporter_config_file.stat.exists
        fail_msg: "blackbox_exporter config not found"

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert blackbox_exporter service is running
      ansible.builtin.assert:
        that:
          - "'blackbox_exporter.service' in ansible_facts.services"
          - "ansible_facts.services['blackbox_exporter.service'].state == 'running'"
        fail_msg: "blackbox_exporter service is not running"

    - name: Assert blackbox_exporter port is listening
      ansible.builtin.wait_for:
        port: 9115
        timeout: 30

    - name: Assert blackbox_exporter health endpoint responds
      ansible.builtin.uri:
        url: "http://localhost:9115/"
        status_code: 200
      register: blackbox_exporter_health
      retries: 5
      delay: 3
      until: blackbox_exporter_health.status == 200
