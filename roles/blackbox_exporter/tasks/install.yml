---
- name: Set download architecture
  ansible.builtin.set_fact:
    blackbox_exporter_arch: "{{ (ansible_architecture == 'aarch64') | ternary('arm64', 'amd64') }}"

- name: Create blackbox_exporter system group
  ansible.builtin.group:
    name: "{{ blackbox_exporter_group }}"
    system: true
    state: present

- name: Create blackbox_exporter system user
  ansible.builtin.user:
    name: "{{ blackbox_exporter_user }}"
    group: "{{ blackbox_exporter_group }}"
    shell: /sbin/nologin
    system: true
    create_home: false
    state: present

- name: Ensure blackbox_exporter config directory exists
  ansible.builtin.file:
    path: "{{ blackbox_exporter_config_dir }}"
    state: directory
    owner: "{{ blackbox_exporter_user }}"
    group: "{{ blackbox_exporter_group }}"
    mode: "0750"

- name: Check if blackbox_exporter binary exists
  ansible.builtin.stat:
    path: "{{ blackbox_exporter_install_dir }}/blackbox_exporter"
  register: blackbox_exporter_binary

- name: Check installed blackbox_exporter version
  ansible.builtin.command:
    cmd: "{{ blackbox_exporter_install_dir }}/blackbox_exporter --version"
  register: blackbox_exporter_installed_version
  changed_when: false
  failed_when: false
  when: blackbox_exporter_binary.stat.exists

- name: Download blackbox_exporter archive
  ansible.builtin.get_url:
    url: >-
      https://github.com/prometheus/blackbox_exporter/releases/download/v{{
      blackbox_exporter_version }}/blackbox_exporter-{{
      blackbox_exporter_version }}.linux-{{ blackbox_exporter_arch }}.tar.gz
    dest: "/tmp/blackbox_exporter-{{ blackbox_exporter_version }}.tar.gz"
    checksum: "sha256:{{ blackbox_exporter_checksum[blackbox_exporter_arch] }}"
    mode: "0644"
  when: >
    not blackbox_exporter_binary.stat.exists or
    blackbox_exporter_version not in
    (blackbox_exporter_installed_version.stdout | default(''))

- name: Extract blackbox_exporter archive
  ansible.builtin.unarchive:
    src: "/tmp/blackbox_exporter-{{ blackbox_exporter_version }}.tar.gz"
    dest: "/tmp"
    remote_src: true
  when: >
    not blackbox_exporter_binary.stat.exists or
    blackbox_exporter_version not in
    (blackbox_exporter_installed_version.stdout | default(''))

- name: Install blackbox_exporter binary
  ansible.builtin.copy:
    src: >-
      /tmp/blackbox_exporter-{{ blackbox_exporter_version
      }}.linux-{{ blackbox_exporter_arch }}/blackbox_exporter
    dest: "{{ blackbox_exporter_install_dir }}/blackbox_exporter"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: restart blackbox_exporter
  when: >
    not blackbox_exporter_binary.stat.exists or
    blackbox_exporter_version not in
    (blackbox_exporter_installed_version.stdout | default(''))

- name: Deploy blackbox_exporter systemd service
  ansible.builtin.template:
    src: blackbox_exporter.service.j2
    dest: /etc/systemd/system/blackbox_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart blackbox_exporter

- name: Ensure blackbox_exporter is started and enabled
  ansible.builtin.service:
    name: blackbox_exporter
    state: started
    enabled: true

- name: Clean up downloaded archive
  ansible.builtin.file:
    path: "/tmp/blackbox_exporter-{{ blackbox_exporter_version }}.tar.gz"
    state: absent

- name: Clean up extracted directory
  ansible.builtin.file:
    path: "/tmp/blackbox_exporter-{{ blackbox_exporter_version }}.linux-{{ blackbox_exporter_arch }}"
    state: absent
