---
- name: Deploy blackbox_exporter modules config
  ansible.builtin.template:
    src: blackbox.yml.j2
    dest: "{{ blackbox_exporter_config_dir }}/blackbox.yml"
    owner: "{{ blackbox_exporter_user }}"
    group: "{{ blackbox_exporter_group }}"
    mode: "0640"
    validate: >-
      {{ blackbox_exporter_install_dir }}/blackbox_exporter
      --config.file=%s --config.check
  notify: reload blackbox_exporter
