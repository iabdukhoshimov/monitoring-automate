---
- name: Set download architecture
  ansible.builtin.set_fact:
    node_exporter_arch: "{{ (ansible_architecture == 'aarch64') | ternary('arm64', 'amd64') }}"

- name: Create node_exporter system group
  ansible.builtin.group:
    name: "{{ node_exporter_group }}"
    system: true
    state: present

- name: Create node_exporter system user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    shell: /sbin/nologin
    system: true
    create_home: false
    state: present

- name: Check if node_exporter binary exists
  ansible.builtin.stat:
    path: "{{ node_exporter_install_dir }}/node_exporter"
  register: node_exporter_binary

- name: Check installed node_exporter version
  ansible.builtin.command:
    cmd: "{{ node_exporter_install_dir }}/node_exporter --version"
  register: node_exporter_installed_version
  changed_when: false
  failed_when: false
  when: node_exporter_binary.stat.exists

- name: Download node_exporter archive
  ansible.builtin.get_url:
    url: >-
      https://github.com/prometheus/node_exporter/releases/download/v{{
      node_exporter_version }}/node_exporter-{{
      node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    checksum: "sha256:{{ node_exporter_checksum[node_exporter_arch] }}"
    mode: "0644"
  when: >
    not node_exporter_binary.stat.exists or
    node_exporter_version not in
    (node_exporter_installed_version.stdout | default(''))

- name: Extract node_exporter archive
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: "/tmp"
    remote_src: true
  when: >
    not node_exporter_binary.stat.exists or
    node_exporter_version not in
    (node_exporter_installed_version.stdout | default(''))

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}/node_exporter"
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: restart node_exporter
  when: >
    not node_exporter_binary.stat.exists or
    node_exporter_version not in
    (node_exporter_installed_version.stdout | default(''))

- name: Deploy node_exporter systemd service
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart node_exporter

- name: Ensure node_exporter is started and enabled
  ansible.builtin.service:
    name: node_exporter
    state: started
    enabled: true

- name: Clean up downloaded archive
  ansible.builtin.file:
    path: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    state: absent

- name: Clean up extracted directory
  ansible.builtin.file:
    path: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}"
    state: absent
