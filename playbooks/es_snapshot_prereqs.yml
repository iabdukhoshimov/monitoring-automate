---
# One-time prerequisite setup on the Elasticsearch host.
# Run this ONCE before es_snapshot.yml to:
#   - Install the repository-s3 plugin
#   - Configure the S3/MinIO client settings in elasticsearch.yml
#   - Store MinIO credentials in the ES keystore
#
# Usage:
#   ansible-playbook playbooks/es_snapshot_prereqs.yml -i inventories/production
#
# Requires SSH access to the Elasticsearch host(s).

- name: Prepare Elasticsearch host for MinIO snapshots
  hosts: elasticsearch
  become: true
  roles:
    - role: es_snapshot
      tasks_from: prereqs.yml
  tags: [es_snapshot_prereqs]
