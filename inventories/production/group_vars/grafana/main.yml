---
grafana_version: "12.4.2"
grafana_port: 3000
# SHA256 checksum — update when changing grafana_version
# Get from: https://grafana.com/grafana/download?edition=oss
grafana_checksum: ""
grafana_admin_user: "admin"
grafana_domain: "trust.internal"

# Datasources — provisioned via Grafana API
# URLs built dynamically from inventory groups
grafana_datasources:
  - name: "Prometheus"
    type: "prometheus"
    access: "proxy"
    isDefault: true
    url: "http://{{ groups['prometheus'][0] }}:{{ prometheus_port }}"
    jsonData:
      timeInterval: "{{ prometheus_scrape_interval }}"
      httpMethod: "POST"

  - name: "Loki"
    type: "loki"
    access: "proxy"
    isDefault: false
    url: "http://{{ groups['loki'][0] }}:{{ loki_port }}"
    jsonData:
      maxLines: 1000

# Dashboards — auto-imported from grafana.com on first deploy.
# uid: checked first — skipped if already present (idempotent).
# revision: pin to a tested version; bump deliberately when upgrading.
# inputs: Grafana datasource variable substitution for this dashboard.
grafana_dashboards:
  - name: "node-exporter-full"
    gnet_id: 1860
    revision: 37
    uid: "rYdddlPWk"
    inputs:
      - name: "DS_PROMETHEUS"
        type: datasource
        pluginId: prometheus
        value: "Prometheus"

  - name: "blackbox-exporter"
    gnet_id: 7587
    revision: 3
    uid: "xtkCtBkis"
    inputs:
      - name: "DS_PROMETHEUS"
        type: datasource
        pluginId: prometheus
        value: "Prometheus"

  - name: "prometheus-stats"
    gnet_id: 2
    revision: 2
    uid: "000000002"
    inputs:
      - name: "DS_PROMETHEUS"
        type: datasource
        pluginId: prometheus
        value: "Prometheus"

  - name: "loki-logs"
    gnet_id: 13639
    revision: 2
    uid: "loki-logs-dashboard"
    inputs:
      - name: "DS_LOKI"
        type: datasource
        pluginId: loki
        value: "Loki"
