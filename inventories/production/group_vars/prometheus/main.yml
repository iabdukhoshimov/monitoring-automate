---
prometheus_version: "3.11.0"
prometheus_port: 9090
# Explicit cross-role dependency: must match node_exporter_port in node_exporter role
node_exporter_port: 9100
prometheus_retention: "30d"
prometheus_scrape_interval: "15s"
prometheus_evaluation_interval: "15s"
prometheus_cluster_name: "production"

# SHA256 checksums per architecture — update when changing prometheus_version
# Get from: https://github.com/prometheus/prometheus/releases
prometheus_checksum:
  amd64: "ff799c3e4c318e17dec14aaaa406a4da328fabb4578336b36d96d893870c3b76"
  arm64: "4d983175e77161e30b94922c49fdb681cf849439613d24a026bbb8d1ca4e8728"

# Blackbox probe targets — add/remove endpoints here without redeployment
# These are scraped via the blackbox_exporter on the blackbox_exporter host.
prometheus_blackbox_http_targets:
  - "https://grafana.internal:3000"
  - "http://prometheus.internal:9090/-/healthy"
  - "http://alertmanager.internal:9093/-/healthy"

prometheus_blackbox_tcp_targets:
  - "prometheus.internal:9090"
  - "alertmanager.internal:9093"
  - "grafana.internal:3000"

prometheus_blackbox_icmp_targets:
  - "prometheus.internal"
  - "alertmanager.internal"
  - "grafana.internal"
  - "blackbox.internal"
