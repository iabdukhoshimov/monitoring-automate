---
# Elasticsearch snapshot to MinIO — production settings
# Credentials come from vault (see inventories/production/group_vars/all/vault.yml)

es_snapshot_es_url: "http://as-1.internal:9200"
es_snapshot_es_user: ""
es_snapshot_es_password: ""

es_snapshot_minio_url: "http://minio.internal:9000"
es_snapshot_minio_bucket: "es-snapshots"
es_snapshot_minio_access_key: "{{ vault_minio_access_key }}"
es_snapshot_minio_secret_key: "{{ vault_minio_secret_key }}"

es_snapshot_s3_client_name: "minio"
es_snapshot_repository_name: "minio_backup"
es_snapshot_index_pattern: "logs-*"

# Keep last 7 days fully searchable in ES
es_snapshot_hot_days: 7

# Daily at 02:00
es_snapshot_schedule: "0 0 2 * * ?"

# Retain snapshots in MinIO for 90 days
es_snapshot_max_age: "90d"
es_snapshot_min_count: 1
