---
grafana_version: "10.4.0"
grafana_port: 3000
# SHA256 checksum — set to empty string to skip verification
# Get from: https://grafana.com/grafana/download?edition=oss
grafana_checksum: ""
grafana_admin_user: "admin"
grafana_domain: "staging-grafana.example.com"

grafana_datasources:
  - name: "Prometheus"
    type: "prometheus"
    access: "proxy"
    isDefault: true
    url: "http://{{ groups['prometheus'][0] }}:{{ prometheus_port }}"
    jsonData:
      timeInterval: "{{ prometheus_scrape_interval }}"
      httpMethod: "POST"

  - name: "Loki"
    type: "loki"
    access: "proxy"
    isDefault: false
    url: "http://{{ groups['loki'][0] }}:{{ loki_port }}"
    jsonData:
      maxLines: 1000

grafana_dashboards:
  - name: "node-exporter-full"
    gnet_id: 1860
    revision: 37
    uid: "rYdddlPWk"
    inputs:
      - name: "DS_PROMETHEUS"
        type: datasource
        pluginId: prometheus
        value: "Prometheus"

  - name: "blackbox-exporter"
    gnet_id: 7587
    revision: 3
    uid: "xtkCtBkis"
    inputs:
      - name: "DS_PROMETHEUS"
        type: datasource
        pluginId: prometheus
        value: "Prometheus"

  - name: "prometheus-stats"
    gnet_id: 2
    revision: 2
    uid: "000000002"
    inputs:
      - name: "DS_PROMETHEUS"
        type: datasource
        pluginId: prometheus
        value: "Prometheus"
