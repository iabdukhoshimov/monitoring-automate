---
grafana_version: "12.4.2"
grafana_port: 3000
# SHA256 checksum — set to empty string to skip verification
# Get from: https://grafana.com/grafana/download?edition=oss
grafana_checksum: ""
grafana_admin_user: "admin"
grafana_domain: "dev-grafana.example.com"

grafana_datasources:
  - name: "Prometheus"
    type: "prometheus"
    access: "proxy"
    isDefault: true
    url: "http://{{ hostvars[groups['prometheus'][0]]['ansible_host'] }}:{{ prometheus_port }}"
    jsonData:
      timeInterval: "{{ prometheus_scrape_interval }}"
      httpMethod: "POST"

  - name: "Loki"
    type: "loki"
    access: "proxy"
    isDefault: false
    url: "http://{{ hostvars[groups['loki'][0]]['ansible_host'] }}:{{ loki_port }}"
    jsonData:
      maxLines: 1000

grafana_dashboards:
  - name: "node-exporter-full"
    gnet_id: 1860
    revision: 37
    uid: "rYdddlPWk"
    inputs:
      - name: "DS_PROMETHEUS"
        type: datasource
        pluginId: prometheus
        value: "Prometheus"

  - name: "prometheus-stats"
    gnet_id: 2
    revision: 2
    uid: "000000002"
    inputs:
      - name: "DS_PROMETHEUS"
        type: datasource
        pluginId: prometheus
        value: "Prometheus"
